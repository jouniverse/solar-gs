<!-- Location Tab: Leaflet map + coordinate inputs + fetch controls -->

<div class="section">
  <h3>Select Location</h3>

  <!-- Search bar -->
  <div class="form-row">
    <label for="location-search">Search address</label>
    <div class="form-row-inline" style="margin-bottom: 0">
      <div style="flex: 3">
        <input
          type="text"
          id="location-search"
          placeholder="Enter address or place name..."
        />
      </div>
      <div style="flex: 1">
        <button
          class="btn btn-secondary btn-sm"
          onclick="geocodeSearch()"
          style="width: 100%; height: 100%"
        >
          Search
        </button>
      </div>
    </div>
  </div>

  <!-- Map type toggle -->
  <div class="map-type-toggle">
    <button
      class="map-type-btn active"
      id="map-type-satellite"
      onclick="setMapType('satellite')"
    >
      Satellite
    </button>
    <button
      class="map-type-btn"
      id="map-type-street"
      onclick="setMapType('street')"
    >
      Street
    </button>
  </div>

  <!-- Map -->
  <div id="location-map" style="height: 220px; margin-bottom: 8px"></div>

  <!-- Coordinate inputs -->
  <div class="form-row-inline">
    <div>
      <label for="input-lat">Latitude</label>
      <input
        type="number"
        id="input-lat"
        step="0.000001"
        min="-90"
        max="90"
        placeholder="51.5124"
      />
    </div>
    <div>
      <label for="input-lng">Longitude</label>
      <input
        type="number"
        id="input-lng"
        step="0.000001"
        min="-180"
        max="180"
        placeholder="-0.0913"
      />
    </div>
  </div>

  <!-- Quality & Radius -->
  <div class="form-row-inline">
    <div>
      <label for="input-quality">Imagery Quality</label>
      <select id="input-quality">
        <option value="HIGH" selected>HIGH</option>
        <option value="MEDIUM">MEDIUM</option>
        <option value="LOW">LOW</option>
      </select>
    </div>
    <div>
      <label for="input-radius">Radius (m)</label>
      <input
        type="number"
        id="input-radius"
        min="10"
        max="200"
        value="50"
        step="10"
      />
    </div>
  </div>

  <!-- Fetch button -->
  <button id="btn-fetch" class="btn btn-primary" onclick="onFetchClick()">
    Fetch Solar Data
  </button>
</div>

<script>
  // ============================================================
  // Location Map (Leaflet)
  // ============================================================
  var locationMap, locationMarker;
  var satelliteLayer, streetLayer;
  var currentMapType = "satellite";

  document.addEventListener("DOMContentLoaded", function () {
    locationMap = L.map("location-map", {
      center: [51.5124, -0.0913],
      zoom: 17,
      zoomControl: true,
    });

    // Satellite tile layer (Esri) — no labels
    satelliteLayer = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      { attribution: "Esri", maxZoom: 20 },
    );

    // Street tile layer (OSM)
    streetLayer = L.tileLayer(
      "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      { attribution: "&copy; OSM", maxZoom: 20 },
    );

    // Default: satellite
    satelliteLayer.addTo(locationMap);

    // Click to place marker
    locationMap.on("click", function (e) {
      setLocationMarker(e.latlng.lat, e.latlng.lng);
      updateCoordinateInputs(e.latlng.lat, e.latlng.lng);
      APP.lat = e.latlng.lat;
      APP.lng = e.latlng.lng;
    });

    // Coordinate input changes
    document
      .getElementById("input-lat")
      .addEventListener("change", onCoordinateInputChange);
    document
      .getElementById("input-lng")
      .addEventListener("change", onCoordinateInputChange);
    document
      .getElementById("input-quality")
      .addEventListener("change", function () {
        APP.quality = this.value;
      });
    document
      .getElementById("input-radius")
      .addEventListener("change", function () {
        APP.radiusMeters = parseInt(this.value) || 50;
      });

    document
      .getElementById("location-search")
      .addEventListener("keydown", function (e) {
        if (e.key === "Enter") {
          e.preventDefault();
          geocodeSearch();
        }
      });
  });

  function setMapType(type) {
    currentMapType = type;
    if (type === "satellite") {
      locationMap.removeLayer(streetLayer);
      satelliteLayer.addTo(locationMap);
    } else {
      locationMap.removeLayer(satelliteLayer);
      streetLayer.addTo(locationMap);
    }
    document
      .getElementById("map-type-satellite")
      .classList.toggle("active", type === "satellite");
    document
      .getElementById("map-type-street")
      .classList.toggle("active", type === "street");
  }

  function setLocationMarker(lat, lng) {
    if (locationMarker) {
      locationMarker.setLatLng([lat, lng]);
    } else {
      locationMarker = L.marker([lat, lng], { draggable: true }).addTo(
        locationMap,
      );
      locationMarker.on("dragend", function (e) {
        var pos = e.target.getLatLng();
        updateCoordinateInputs(pos.lat, pos.lng);
        APP.lat = pos.lat;
        APP.lng = pos.lng;
      });
    }
    locationMap.setView([lat, lng], Math.max(locationMap.getZoom(), 17));
  }

  function updateCoordinateInputs(lat, lng) {
    document.getElementById("input-lat").value = lat.toFixed(6);
    document.getElementById("input-lng").value = lng.toFixed(6);
  }

  function onCoordinateInputChange() {
    var lat = parseFloat(document.getElementById("input-lat").value);
    var lng = parseFloat(document.getElementById("input-lng").value);
    if (
      !isNaN(lat) &&
      !isNaN(lng) &&
      lat >= -90 &&
      lat <= 90 &&
      lng >= -180 &&
      lng <= 180
    ) {
      APP.lat = lat;
      APP.lng = lng;
      setLocationMarker(lat, lng);
    }
  }

  // ============================================================
  // Geocoding (Nominatim)
  // ============================================================
  function geocodeSearch() {
    var query = document.getElementById("location-search").value.trim();
    if (!query) return;

    var url =
      "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" +
      encodeURIComponent(query);

    fetch(url, {
      headers: { Accept: "application/json" },
    })
      .then(function (res) {
        return res.json();
      })
      .then(function (results) {
        if (results && results.length > 0) {
          var lat = parseFloat(results[0].lat);
          var lng = parseFloat(results[0].lon);
          APP.lat = lat;
          APP.lng = lng;
          setLocationMarker(lat, lng);
          updateCoordinateInputs(lat, lng);
        } else {
          showError("Location not found. Try a different search term.");
        }
      })
      .catch(function (err) {
        showError("Geocoding failed: " + err.message);
      });
  }

  // ============================================================
  // Fetch Button Handler
  // ============================================================
  function onFetchClick() {
    APP.quality = document.getElementById("input-quality").value;
    APP.radiusMeters =
      parseInt(document.getElementById("input-radius").value) || 50;
    fetchSolarData();
  }
</script>
