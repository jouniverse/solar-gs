<!-- Horizon Profile Tab -->
<div class="tab-title">Horizon Profile</div>
<div class="location-display">Location: 45, 8</div>

<form id="form-horizon" onsubmit="return false;">
  <p style="font-size: 12px; color: #5f6368; margin-bottom: 12px">
    Fetches the terrain horizon profile and sun paths (winter/summer solstice)
    for the selected location.
  </p>

  <button class="collapsible-toggle">Custom horizon profile</button>
  <div class="collapsible-content">
    <div class="form-group">
      <label for="hp-userhorizon"
        >Horizon heights (comma-separated, starting N clockwise, in
        degrees)</label
      >
      <input
        type="text"
        name="userhorizon"
        id="hp-userhorizon"
        placeholder="e.g. 0,10,20,30,40,15,25,5"
      />
    </div>
  </div>

  <button
    class="btn-primary"
    onclick="fetchData('fetchHorizonProfile', 'form-horizon')"
  >
    Fetch Horizon Profile
  </button>
</form>
