<!-- Location Tab -->
<div class="tab-title">Location</div>

<div id="location-map"></div>

<div class="form-row">
  <div class="form-group">
    <label class="required" for="input-lat">Latitude</label>
    <input
      type="number"
      id="input-lat"
      step="0.000001"
      min="-90"
      max="90"
      value="45"
      onchange="onLatLonInput()"
      placeholder="e.g. 45.0"
    />
  </div>
  <div class="form-group">
    <label class="required" for="input-lon">Longitude</label>
    <input
      type="number"
      id="input-lon"
      step="0.000001"
      min="-180"
      max="180"
      value="8"
      onchange="onLatLonInput()"
      placeholder="e.g. 8.0"
    />
  </div>
</div>

<div class="form-group">
  <div class="checkbox-group">
    <input type="checkbox" id="input-usehorizon" checked />
    <label for="input-usehorizon"
      >Use terrain shadows (calculated horizon)</label
    >
  </div>
</div>

<button class="collapsible-toggle">Custom horizon profile</button>
<div class="collapsible-content">
  <div class="form-group">
    <label for="input-userhorizon"
      >Horizon heights (comma-separated, starting N clockwise)</label
    >
    <input
      type="text"
      id="input-userhorizon"
      placeholder="e.g. 0,10,20,30,40,15,25,5"
    />
  </div>
</div>

<div class="location-display">Location: 45, 8</div>

<p style="font-size: 11px; color: #5f6368; margin-top: 8px">
  Click the map or enter coordinates to set the location. This location is
  shared across all tabs.
</p>
