<style>
  /* ─── Reset & Base ────────────────────────────────── */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: "Google Sans", Roboto, Arial, sans-serif;
    font-size: 13px;
    color: #202124;
    background: #fff;
    padding: 0;
    overflow-x: hidden;
  }

  /* ─── Tab Navigation ─────────────────────────────── */
  .tab-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    padding: 8px 8px 0;
    background: #f8f9fa;
    border-bottom: 1px solid #dadce0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .tab-btn {
    flex: 0 1 auto;
    padding: 6px 8px;
    font-size: 11px;
    font-weight: 500;
    border: 1px solid #dadce0;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: #f1f3f4;
    color: #5f6368;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .tab-btn:hover {
    background: #e8eaed;
    color: #202124;
  }

  .tab-btn.active {
    background: #fff;
    color: #1a73e8;
    border-color: #dadce0;
    font-weight: 600;
  }

  /* ─── Tab Content ────────────────────────────────── */
  .tab-content {
    display: none;
    padding: 12px;
  }

  .tab-content.active {
    display: block;
  }

  /* ─── Form Elements ──────────────────────────────── */
  .form-group {
    margin-bottom: 10px;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: #5f6368;
    margin-bottom: 3px;
  }

  .form-group label.required::after {
    content: " *";
    color: #d93025;
  }

  input[type="number"],
  input[type="text"],
  select {
    width: 100%;
    padding: 6px 8px;
    font-size: 13px;
    border: 1px solid #dadce0;
    border-radius: 4px;
    background: #fff;
    color: #202124;
    transition: border-color 0.15s;
  }

  input[type="number"]:focus,
  input[type="text"]:focus,
  select:focus {
    outline: none;
    border-color: #1a73e8;
    box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
  }

  .form-row {
    display: flex;
    gap: 8px;
  }

  .form-row .form-group {
    flex: 1;
  }

  /* ─── Checkboxes ─────────────────────────────────── */
  .checkbox-group {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
    font-size: 12px;
  }

  .checkbox-group input[type="checkbox"],
  .checkbox-group input[type="radio"] {
    margin: 0;
    accent-color: #1a73e8;
  }

  .checkbox-group label {
    color: #202124;
    margin: 0;
    cursor: pointer;
  }

  /* ─── Section Headers ───────────────────────────── */
  .section-title {
    font-size: 12px;
    font-weight: 600;
    color: #202124;
    margin: 12px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid #e8eaed;
  }

  .tab-title {
    font-size: 14px;
    font-weight: 600;
    color: #202124;
    margin-bottom: 12px;
  }

  /* ─── Collapsible Sections ──────────────────────── */
  .collapsible-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    padding: 6px 0;
    margin: 8px 0 4px;
    font-size: 12px;
    font-weight: 500;
    color: #1a73e8;
    user-select: none;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }

  .collapsible-toggle::before {
    content: "▶";
    font-size: 9px;
    transition: transform 0.15s;
  }

  .collapsible-toggle.open::before {
    transform: rotate(90deg);
  }

  .collapsible-content {
    display: none;
    padding: 4px 0 4px 12px;
    border-left: 2px solid #e8eaed;
  }

  .collapsible-content.open {
    display: block;
  }

  /* ─── Buttons ────────────────────────────────────── */
  .btn-primary {
    width: 100%;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    background: #1a73e8;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.15s;
    margin-top: 8px;
  }

  .btn-primary:hover {
    background: #1557b0;
  }

  .btn-primary:disabled {
    background: #dadce0;
    color: #80868b;
    cursor: not-allowed;
  }

  .btn-secondary {
    width: 100%;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    color: #1a73e8;
    background: #fff;
    border: 1px solid #dadce0;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.15s;
  }

  .btn-secondary:hover {
    background: #f8f9fa;
  }

  /* ─── Map ────────────────────────────────────────── */
  #location-map {
    width: 100%;
    height: 200px;
    border-radius: 6px;
    border: 1px solid #dadce0;
    margin-bottom: 10px;
  }

  /* ─── Status Bar ─────────────────────────────────── */
  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 8px 12px;
    font-size: 12px;
    z-index: 200;
    transition: all 0.2s;
  }

  .status-bar.hidden {
    display: none;
  }

  .status-bar.loading {
    background: #e8f0fe;
    color: #1a73e8;
  }

  .status-bar.success {
    background: #e6f4ea;
    color: #137333;
  }

  .status-bar.error {
    background: #fce8e6;
    color: #c5221f;
  }

  .status-bar .summary {
    font-size: 11px;
    margin-top: 2px;
    opacity: 0.85;
  }

  /* ─── Spinner ────────────────────────────────────── */
  .spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid #1a73e8;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  /* ─── Location Info ──────────────────────────────── */
  .location-display {
    padding: 6px 8px;
    background: #f8f9fa;
    border-radius: 4px;
    font-size: 11px;
    color: #5f6368;
    margin-bottom: 6px;
    text-align: center;
  }
</style>
